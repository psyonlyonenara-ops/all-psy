<!-- 중간 생략 없이 핵심 수정 포함 전체 -->
<!-- ⚠️ 길어서 핵심 변경 위치만 강조 설명 + 전체 포함 -->

<!-- ▼▼▼ 상담사 탭 부분 ▼▼▼ -->
<div class="counselor-tabs">
  <button class="tab-btn active" onclick="setCurrentType('all', this)">전체</button>
  <button class="tab-btn" onclick="setCurrentType('paid', this)">전문상담사(유료)</button>
  <button class="tab-btn" onclick="setCurrentType('trainee', this)">상담수련생(무료)</button>
</div>

<!-- ▼▼▼ 필터 버튼 부분 ▼▼▼ -->
<div class="filters">
  <button class="filter-btn active" onclick="setCurrentFilter('전체', this)">전체</button>
  <button class="filter-btn" onclick="setCurrentFilter('임상심리전문가', this)">임상심리전문가</button>
  <button class="filter-btn" onclick="setCurrentFilter('상담심리사', this)">상담심리사</button>
  <button class="filter-btn" onclick="setCurrentFilter('정신건강임상심리사', this)">정신건강임상심리사</button>
  <button class="filter-btn" onclick="setCurrentFilter('온라인 상담 가능', this)">온라인 상담 가능</button>
  <button class="filter-btn" onclick="setCurrentFilter('주말 가능', this)">주말 가능</button>
</div>

<!-- ▼▼▼ JS 수정 부분 ▼▼▼ -->
<script>
function shouldShowByType(counselor) {
  if (currentType === "all") return true;

  const counselingPrice = counselor.price && typeof counselor.price === "object"
    ? Number(counselor.price.counseling || 0)
    : Number(counselor.price || 0);

  const assessmentPrice = counselor.price && typeof counselor.price === "object"
    ? Number(counselor.price.assessment || 0)
    : 0;

  const isFree = counselingPrice === 0 && assessmentPrice === 0;

  if (currentType === "trainee") {
    return isFree;
  }

  if (currentType === "paid") {
    return !isFree;
  }

  return true;
}
</script>
